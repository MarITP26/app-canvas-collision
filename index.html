<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Colisión 2D</title>
<link rel="shortcut icon" href="./assets/img/balon_fut.png" type="image/x-icon" />
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS personalizado -->
    <link rel="stylesheet" href="./assets/css/styles.css">
</head>
<body>

<!-- 🔷 NAVBAR -->
<nav class="navbar navbar-dark bg-dark shadow">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">Simulación de Colisiones 2D</span>
    </div>
</nav>

<!-- 🔷 CONTENIDO -->
<div class="container mt-4">

    <!-- 🔥 CONTROL -->
    <div class="card p-3 mb-4 shadow">
        <h5 class="mb-3">Configuración</h5>

        <label for="rangeCircles" class="form-label">
            Cantidad de círculos: <span id="valorCirculos">10</span>
        </label>

        <input type="range" class="form-range" min="1" max="50" value="10" id="rangeCircles">
    </div>

    <!-- 🔥 CANVAS GRID -->
    <div class="row g-4">

        <div class="col-md-4">
            <div class="card shadow p-2">
                <h6 class="text-center">Movimiento</h6>
                <canvas id="canvas1"></canvas>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow p-2">
                <h6 class="text-center">Colisión (sin rebote)</h6>
                <canvas id="canvas2"></canvas>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow p-2">
                <h6 class="text-center">Colisión con rebote</h6>
                <canvas id="canvas3"></canvas>
            </div>
        </div>

    </div>
</div>

<!-- 🔻 FOOTER -->
<footer class="bg-dark text-white text-center mt-5 p-3">
    <p class="mb-0">Proyecto Canvas 2D | Simulación de colisiones</p>
</footer>

<!-- JS -->
<script src="./assets/js/control.js"></script>
<script src="./assets/js/main.js"></script>
<script src="./assets/js/main_colision.js"></script>
<script src="./assets/js/main_rebote.js"></script>

</body>
</html>
